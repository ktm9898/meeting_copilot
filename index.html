<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meeting Copilot</title>
    <meta name="theme-color" content="#0f0f14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MeetCopilot">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='%234a9eff'>🎙</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #1a1a24;
            --bg-card: #22223a;
            --bg-card-hover: #2a2a45;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --accent-blue: #4a9eff;
            --accent-green: #34d399;
            --accent-amber: #fbbf24;
            --accent-red: #f87171;
            --accent-purple: #a78bfa;
            --border-color: #2a2a3e;
            --flash-glow: rgba(74, 158, 255, 0.15);
            --radius: 12px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --bg-primary: #f5f5fa;
            --bg-secondary: #ffffff;
            --bg-card: #eeeef5;
            --bg-card-hover: #e0e0ee;
            --text-primary: #1a1a2e;
            --text-secondary: #666680;
            --text-muted: #999aaa;
            --border-color: #d0d0dd;
            --flash-glow: rgba(74, 158, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            font-size: 1.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 3px 10px;
            background: var(--bg-card);
            border-radius: 20px;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all var(--transition);
        }

        .icon-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* --- Left: STT Stream --- */
        .stt-panel {
            flex: 0 0 38%;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border-right: 1px solid var(--border-color);
            background: var(--bg-primary);
            overflow: hidden;
        }

        .stt-header {
            padding: 12px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        .stt-stream {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-secondary);
            scroll-behavior: smooth;
            word-break: keep-all;
        }

        .stt-stream::-webkit-scrollbar {
            width: 4px;
        }

        .stt-stream::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .stt-word {
            color: var(--text-primary);
            transition: opacity 0.5s;
        }

        .stt-word.old {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .stt-word.interim {
            color: var(--accent-blue);
            font-style: italic;
            opacity: 0.7;
        }

        .stt-word.matched {
            color: var(--accent-amber);
            font-weight: 700;
        }

        /* --- Right: Flash Cards --- */
        .flash-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .flash-header {
            padding: 12px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flash-area {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-secondary);
            word-break: keep-all;
        }

        .flash-area::-webkit-scrollbar {
            width: 4px;
        }

        .flash-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /* 자동 매칭 답변 */
        .answer-line {
            display: inline;
        }

        .answer-line .answer-label {
            color: var(--accent-green);
            font-weight: 700;
            font-size: 0.75rem;
            margin-right: 4px;
        }

        .answer-line .answer-text {
            color: var(--text-primary);
        }

        .answer-line .answer-sep {
            color: var(--text-muted);
            margin: 0 6px;
        }

        /* AI 분석 답변 */
        .ai-answer {
            display: block;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(167, 139, 250, 0.08);
            border-left: 3px solid var(--accent-purple);
            border-radius: 0 6px 6px 0;
            color: var(--text-primary);
            font-size: 0.88rem;
            line-height: 1.6;
            white-space: pre-line;
        }

        .ai-answer .ai-label {
            color: var(--accent-purple);
            font-weight: 700;
            font-size: 0.75rem;
            display: block;
            margin-bottom: 4px;
        }

        /* Empty State */
        .flash-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
        }

        .flash-empty-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .flash-empty-text {
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.6;
        }

        /* ===== CONTROL BAR ===== */
        .control-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .control-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mic-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .mic-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background var(--transition);
        }

        .mic-dot.active {
            background: var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.5);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(248, 113, 113, 0);
            }
        }

        .control-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
        }

        .ctrl-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .ctrl-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .ctrl-btn.primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: #fff;
            border: none;
            font-weight: 700;
        }

        .ctrl-btn.primary:hover {
            opacity: 0.9;
            box-shadow: 0 4px 16px rgba(74, 158, 255, 0.3);
        }

        .ctrl-btn.primary:disabled {
            opacity: 0.4;
        }

        .ctrl-btn.danger {
            color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .ctrl-btn.danger:hover {
            background: rgba(248, 113, 113, 0.1);
        }

        /* ===== SETTINGS MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h2 {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent-blue);
        }

        .form-group .hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* ===== PINNED PANEL ===== */
        .pinned-panel {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 360px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            z-index: 900;
            flex-direction: column;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .pinned-panel.show {
            display: flex;
        }

        .pinned-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .pinned-header h3 {
            font-size: 1rem;
            font-weight: 700;
        }

        .pinned-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .pinned-item {
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            position: relative;
        }

        .pinned-item-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .pinned-item-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .pinned-item-delete:hover {
            color: var(--accent-red);
        }

        /* ===== DATA STATUS BAR ===== */
        .data-status {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .data-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .data-dot.loaded {
            background: var(--accent-green);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                padding: 6px 12px;
            }

            .header-logo {
                font-size: 1rem;
            }

            .header-status {
                font-size: 0.65rem;
                padding: 2px 6px;
            }

            .icon-btn {
                width: 30px;
                height: 30px;
                font-size: 0.85rem;
            }

            .main-content {
                flex-direction: column;
            }

            .stt-panel {
                flex: 0 0 40%;
                max-height: 40%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .stt-header,
            .flash-header {
                padding: 4px 10px;
                font-size: 0.65rem;
                letter-spacing: 0.5px;
            }

            .flash-panel {
                flex: 1;
                min-height: 0;
            }

            .pinned-panel {
                width: 100%;
            }

            .control-bar {
                padding: 6px 8px;
                padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
                gap: 4px;
            }

            .ctrl-btn {
                padding: 8px 12px;
                font-size: 0.75rem;
            }

            .control-left {
                display: none;
            }

            .stt-stream,
            .flash-area {
                font-size: 0.85rem;
                line-height: 1.6;
                padding: 6px 10px;
            }

            .answer-line {
                font-size: 0.82rem;
            }

            .ai-answer {
                font-size: 0.82rem;
                padding: 6px 10px;
            }

            .flash-empty-icon {
                font-size: 2rem;
            }

            .flash-empty-text {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <span class="header-logo">🎙 Meeting Copilot</span>
            <span class="header-status" id="headerStatus">대기 중</span>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="btnFullscreen" title="전체화면">⛶</button>
            <button class="icon-btn" id="btnTheme" title="테마 전환">🌙</button>
            <button class="icon-btn" id="btnPins" title="핀 목록">📌</button>
            <button class="icon-btn" id="btnSettings" title="설정">⚙️</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">
        <!-- STT Stream -->
        <div class="stt-panel">
            <div class="stt-header">
                실시간 음성 인식
                <span class="data-status" id="dataStatus">
                    <span class="data-dot" id="dataDot"></span>
                    <span id="dataStatusText">시트 미연결</span>
                </span>
            </div>
            <div class="stt-stream" id="sttStream">
                <div class="flash-empty">
                    <div class="flash-empty-icon">🎤</div>
                    <div class="flash-empty-text">
                        아래 <strong>듣기 시작</strong> 버튼을 눌러<br>
                        음성 인식을 시작하세요
                    </div>
                </div>
            </div>
        </div>

        <!-- Flash Cards -->
        <div class="flash-panel">
            <div class="flash-header">
                <span>답변 카드</span>
                <button class="icon-btn" id="btnClearCards" title="카드 모두 지우기"
                    style="width:28px;height:28px;font-size:0.75rem;">🗑️</button>
            </div>
            <div class="flash-area" id="flashArea">
                <div class="flash-empty" id="flashEmpty">
                    <div class="flash-empty-icon">💡</div>
                    <div class="flash-empty-text">
                        음성에서 키워드가 감지되면<br>
                        여기에 답변이 표시됩니다
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTROL BAR -->
    <div class="control-bar">
        <div class="control-left">
            <div class="mic-indicator">
                <span class="mic-dot" id="micDot"></span>
                <span id="micStatus">중지됨</span>
            </div>
        </div>
        <div class="control-right">
            <button class="ctrl-btn" id="btnPin" title="현재 텍스트 핀">📌 핀</button>
            <button class="ctrl-btn primary" id="btnContext" title="맥락 분석">🔍 맥락 분석</button>
            <button class="ctrl-btn" id="btnListen" title="듣기 시작/중지">▶ 듣기 시작</button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>⚙️ 설정</h2>
            <div class="form-group">
                <label>Gemini API 키</label>
                <input type="password" id="inputApiKey" placeholder="AIzaSy...">
                <div class="hint">Gemini 2.0 Flash 모델을 사용합니다</div>
            </div>
            <div class="form-group">
                <label>구글 시트 CSV 공개 URL</label>
                <input type="url" id="inputSheetUrl"
                    placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv">
                <div class="hint">시트 열 순서: 문서제목 | 사업구분 | 핵심내용 요약 | 주요 키워드 | 문서원문</div>
            </div>
            <div class="form-group">
                <label>자동 매칭 민감도 (키워드 최소 일치 수)</label>
                <input type="number" id="inputSensitivity" value="1" min="1" max="5">
                <div class="hint">숫자가 클수록 더 많은 키워드가 일치해야 카드가 표시됩니다</div>
            </div>
            <div class="modal-actions">
                <button class="ctrl-btn danger" id="btnUpdateApp" style="flex:1.5;">🔄 최신 버전으로 업데이트</button>
                <button class="ctrl-btn" id="btnSettingsClose">닫기</button>
                <button class="ctrl-btn primary" id="btnSettingsSave">저장</button>
            </div>
        </div>
    </div>

    <!-- PINNED PANEL -->
    <div class="pinned-panel" id="pinnedPanel">
        <div class="pinned-header">
            <h3>📌 핀 목록</h3>
            <button class="icon-btn" id="btnPinsClose" style="width:28px;height:28px;font-size:0.8rem;">✕</button>
        </div>
        <div class="pinned-list" id="pinnedList">
            <div class="flash-empty" style="padding:40px 0;">
                <div class="flash-empty-text">핀한 메모가 없습니다</div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  STATE
        // ============================================================
        const state = {
            listening: false,
            recognition: null,
            speechBuffer: [],        // {time, text, final}
            maxBufferSec: 180,        // 3분 버퍼
            sheetData: [],           // [{사업구분, 문서종류, 핵심내용요약, 주요키워드[], 문서원문}]
            flashCards: [],
            pinnedItems: [],
            lastMatchTime: 0,
            matchCooldownMs: 5000,   // 같은 행 재매칭 방지 쿨다운
            lastMatchedIndices: new Set(),
            isTransitioning: false,  // 마이크 켜짐/꺼짐 상태 전환 중 플래그
        };

        //  WAKE LOCK (화면 꺼짐 방지)

        // ============================================================

        const $ = id => document.getElementById(id);
        const sttStream = $('sttStream');
        const flashArea = $('flashArea');
        const flashEmpty = $('flashEmpty');

        // ============================================================

        // ============================================================

        function showToast(msg, duration = 2000) {

        // ============================================================
        //  GOOGLE SHEETS CSV LOADER
        // ============================================================
        // 구글 시트 URL → CSV export URL 자동 변환
        function normalizeSheetUrl(url) {
            // 이미 export URL이면 그대로
            if (url.includes('/export?') || url.includes('/export?format=csv')) return url;

            // 시트 ID 추출: /spreadsheets/d/{SHEET_ID}/...
            const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
            if (!match) return url;

            const sheetId = match[1];

            // gid 추출 (있으면)
            const gidMatch = url.match(/gid=(\d+)/);
            const gid = gidMatch ? gidMatch[1] : '0';

            return `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
        }

        async function loadSheetData(url) {
            if (!url) { showToast('⚠️ 시트 URL을 설정에서 입력하세요'); return; }

            // URL 자동 변환
            url = normalizeSheetUrl(url);
            console.log('Normalized sheet URL:', url);

            dataStatusText.textContent = '로드 중...';
            try {
                let text = '';
                try {
                    const res = await fetch(url, { redirect: 'follow' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    text = await res.text();
                } catch (directErr) {
                    console.warn('Direct fetch failed, trying CORS proxy:', directErr);
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    const res = await fetch(proxyUrl);
                    if (!res.ok) throw new Error(`프록시 실패 HTTP ${res.status}`);
                    text = await res.text();
                }
                console.log('CSV raw length:', text.length, 'first 200 chars:', text.substring(0, 200));
                parseCSV(text);
                console.log('Parsed rows:', state.sheetData.length, 'Sample:', state.sheetData.slice(0, 2));
                dataDot.classList.add('loaded');
                dataStatusText.textContent = `${state.sheetData.length}건 로드됨`;
                showToast(`✅ 시트 데이터 ${state.sheetData.length}건 로드 완료`);
            } catch (e) {
                dataDot.classList.remove('loaded');
                dataStatusText.textContent = '로드 실패';
                showToast(`❌ 시트 로드 실패: ${e.message}`);
                console.error('Sheet load error:', e);
            }
        }

        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        currentField += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        currentRow.push(currentField.trim());
                        currentField = '';
                    } else if (char === '\n' || char === '\r') {
                        if (char === '\r' && nextChar === '\n') i++;
                        currentRow.push(currentField.trim());
                        if (currentRow.some(c => c)) rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    } else {
                        currentField += char;
                    }
                }
            }
            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                rows.push(currentRow);
            }

            if (rows.length < 2) { state.sheetData = []; return; }

            // 첫 행(헤더) 제외하고 데이터 저장
            state.sheetData = rows.slice(1).filter(cols => cols.length >= 5).map(cols => {
                const keywords = cols[3].split(/[,，]/)
                    .map(k => k.trim())
                    .filter(k => k.length > 0);

                return {
                    title: cols[0],
                    category: cols[1],
                    summary: cols[2],
                    keywords: keywords,
                    fullText: cols[4] || '',
                };
            });
        }

        // ============================================================
        //  SPEECH RECOGNITION (STT)
        // ============================================================
        function initSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast('❌ 이 브라우저는 음성 인식을 지원하지 않습니다');
                return null;
            }

            const recog = new SpeechRecognition();
            recog.lang = 'ko-KR';
            recog.continuous = true;
            recog.interimResults = true;
            recog.maxAlternatives = 1;

            recog.onstart = () => {
                state.listening = true;
                state.isTransitioning = false;
                micDot.classList.add('active');
                micStatus.textContent = '듣는 중...';
                headerStatus.textContent = '🔴 듣는 중';
                $('btnListen').innerHTML = '⏹ 중지';
                $('btnListen').classList.add('danger');
                $('btnListen').classList.remove('primary');
                $('btnListen').disabled = false;

                // 첫 시작 시 빈 상태 제거
                const emptyEl = sttStream.querySelector('.flash-empty');
                if (emptyEl) emptyEl.remove();
            };

            recog.onend = () => {
                state.isTransitioning = false;
                $('btnListen').disabled = false;

                if (state.listening) {
                    console.log('STT connection lost. Restarting in 500ms...');
                    setTimeout(() => {
                        if (state.listening && !state.isTransitioning) {
                            try { recog.start(); } catch (e) { console.error('Restart failed:', e); }
                        }
                    }, 500);
                } else {
                    micDot.classList.remove('active');
                    micStatus.textContent = '중지됨';
                    headerStatus.textContent = '대기 중';
                    $('btnListen').innerHTML = '▶ 듣기 시작';
                    $('btnListen').classList.remove('danger');
                }
            };

            recog.onerror = (e) => {
                state.isTransitioning = false;
                $('btnListen').disabled = false;
                console.warn('STT error:', e.error);
                if (e.error === 'not-allowed') {
                    showToast('❌ 마이크 권한이 필요합니다');
                    state.listening = false;
                } else if (e.error === 'network') {
                    showToast('⚠️ 네트워크 연결 확인 필요');
                }
            };

            recog.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const result = event.results[i];
                    const transcript = result[0].transcript.trim();
                    if (!transcript) continue;

                    if (result.isFinal) {
                        addSTTLine(transcript, true);
                        state.speechBuffer.push({ time: Date.now(), text: transcript, final: true });
                        cleanBuffer();
                        checkKeywordMatch(transcript);
                    } else {
                        updateInterimText(transcript);
                    }
                }
            };

            return recog;
        }

        // 현재 작성 중인 span (interim이 교체하는 대상)
        let currentSpan = null;
        let lastFinalText = '';

        function addSTTLine(text, isFinal) {
            // 중복 final 방지
            if (text === lastFinalText) return;
            lastFinalText = text;

            // interim span이 있으면 확정
            if (currentSpan) {
                currentSpan.classList.remove('interim');
                currentSpan.textContent = text + ' ';
            } else {
                const span = document.createElement('span');
                span.className = 'stt-word';
                span.textContent = text + ' ';
                sttStream.appendChild(span);
                currentSpan = span;
            }

            // 확정 후 다음을 위해 currentSpan 초기화
            currentSpan = null;
            sttStream.scrollTop = sttStream.scrollHeight;

            // 오래된 텍스트 희미하게
            const words = sttStream.querySelectorAll('.stt-word:not(.old)');
            if (words.length > 20) {
                for (let i = 0; i < words.length - 10; i++) {
                    words[i].classList.add('old');
                }
            }
        }

        function updateInterimText(text) {
            if (!currentSpan) {
                currentSpan = document.createElement('span');
                currentSpan.className = 'stt-word interim';
                sttStream.appendChild(currentSpan);
            }
            currentSpan.textContent = text;
            sttStream.scrollTop = sttStream.scrollHeight;
        }

        function cleanBuffer() {
            const cutoff = Date.now() - state.maxBufferSec * 1000;
            state.speechBuffer = state.speechBuffer.filter(b => b.time > cutoff);
        }

        // ============================================================
        //  AUDIO HEARTBEAT (KEEP ALIVE)
        // ============================================================
        let audioCtx = null;
        function startAudioHeartbeat() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.001; // 거의 무음
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                console.log('Audio heartbeat started');
            } catch (e) {
                console.warn('Audio heartbeat failed:', e);
            }
        }

        async function forceUpdateApp() {
            if (!confirm('앱의 캐시를 모두 삭제하고 최신 버전으로 업데이트하시겠습니까?\n(API 키와 시트 주소는 그대로 유지됩니다)')) return;

            showToast('🔄 업데이트 준비 중...');

            try {
                // 1. 모든 캐시 삭제
                if ('caches' in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map(key => caches.delete(key)));
                    console.log('Caches cleared');
                }

                // 2. 서비스 워커 해제
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                    console.log('Service workers unregistered');
                }

                showToast('🚀 최신 버전 로딩 중...');

                // 3. 서버에서 강제 새로고침
                setTimeout(() => {
                    location.reload(true);
                }, 1000);
            } catch (e) {
                console.error('Update failed:', e);
                showToast('❌ 업데이트 실패: ' + e.message);
            }
        }

        // ============================================================
        //  KEYWORD MATCHING (AUTO MODE)
        // ============================================================
        function checkKeywordMatch(text) {
            if (state.sheetData.length === 0) return;

            const settings = loadSettings();
            const sensitivity = settings.sensitivity || 1;
            const now = Date.now();
            const normalizedText = text.toLowerCase();

            console.log(`🔍 매칭 검사: "${text}" (시트 ${state.sheetData.length}건)`);

            state.sheetData.forEach((row, idx) => {
                if (state.lastMatchedIndices.has(idx) && now - state.lastMatchTime < state.matchCooldownMs) return;

                const matchedKws = row.keywords.filter(kw =>
                    normalizedText.includes(kw.toLowerCase())
                );

                if (matchedKws.length >= sensitivity) {
                    console.log(`✅ 매칭! [${row.title}] keywords: ${matchedKws.join(', ')}`);
                    state.lastMatchTime = now;
                    state.lastMatchedIndices.add(idx);

                    // STT에서 마지막 단어 하이라이트
                    const lastWord = sttStream.querySelector('.stt-word:last-of-type:not(.interim)');
                    if (lastWord) lastWord.classList.add('matched');

                    // 답변 텍스트 추가
                    addAnswer(row.title, row.summary, matchedKws);

                    setTimeout(() => state.lastMatchedIndices.delete(idx), state.matchCooldownMs);
                }
            });

            // 매칭 안 된 경우 첫 한번만 상태 표시
            if (!state._matchDebugShown && state.sheetData.length > 0) {
                state._matchDebugShown = true;
                const kwSample = state.sheetData.slice(0, 3).map(r => r.keywords.join(',')).join(' / ');
                console.log(`📋 시트 키워드 예시: ${kwSample}`);
            }
        }

        // ============================================================
        //  ANSWERS (미니멀 텍스트)
        // ============================================================
        function addAnswer(label, text, matchedKws = []) {
            flashEmpty.style.display = 'none';
            const line = document.createElement('div');
            line.className = 'answer-line';

            // 키워드 표시 (있을 경우)
            const kwTag = matchedKws.length > 0 ? ` <span style="font-size:0.8em; opacity:0.7;">(키워드: ${matchedKws.join(', ')})</span>` : '';

            // 본문 문장 단위 줄바꿈 (마침표, 물음표 뒤)
            const formatted = text
                .replace(/([.?!])\s+/g, '$1\n') // 문장 기호 뒤 공백을 줄바꿈으로
                .replace(/\n+/g, '\n')         // 중복 줄바꿈 정리
                .trim();

            line.innerHTML = `
                <div class="answer-label">📋 ${label}${kwTag}</div>
                <div class="answer-text" style="white-space: pre-wrap; margin-top: 4px;">${formatted}</div>
            `;
            flashArea.appendChild(line);
            flashArea.scrollTop = flashArea.scrollHeight;
        }

        // ============================================================
        //  GEMINI API (MANUAL CONTEXT ANALYSIS)
        // ============================================================
        async function analyzeContext() {
            const settings = loadSettings();
            if (!settings.apiKey) {
                showToast('⚠️ 설정에서 Gemini API 키를 입력하세요');
                return;
            }

            const cutoff = Date.now() - 180000;
            const recentText = state.speechBuffer
                .filter(b => b.time > cutoff && b.final)
                .map(b => b.text)
                .join(' ');

            if (!recentText) {
                showToast('⚠️ 분석할 최근 대화가 없습니다');
                return;
            }

            let contextData = '';
            const normalizedText = recentText.toLowerCase();
            const matchedRows = state.sheetData.filter(row =>
                row.keywords.some(kw => normalizedText.includes(kw.toLowerCase()))
            );

            if (matchedRows.length > 0) {
                contextData = matchedRows.map(r =>
                    `[${r.title}/${r.category}]\n${r.fullText || r.summary}`
                ).join('\n\n---\n\n');
            } else if (state.sheetData.length > 0) {
                contextData = state.sheetData.map(r =>
                    `[${r.title}/${r.category}] ${r.summary}`
                ).join('\n');
            }

            $('btnContext').disabled = true;
            $('btnContext').innerHTML = '⏳ 분석 중...';

            try {
                // 매칭된 카테고리 추출
                const categories = [...new Set(matchedRows.map(r => r.category))].filter(c => c);
                const categoryTag = categories.length > 0 ? ` (주제: ${categories.join(', ')})` : '';

                const systemInstruction = `당신은 금융 및 경영 전문 컨설턴트이자 회의 보조 AI입니다.
[참고 자료]를 바탕으로 회의 내용을 정밀하게 분석하여 전문적인 조언이 담긴 리포트를 작성하세요.

절대 준수 규칙:
1. 핵심 수치, 금액, 날짜, 고유 명사 등 **사실 확인(Fact-check)**이 필요한 정보 중심으로 작성하세요.
2. 답변 분량은 가독성을 위해 **약 1000자 이내**로 조절하세요. (너무 길거나 너무 짧지 않게)
3. 중요한 사실관계와 수치는 반드시 **볼드체**로 강조하세요.
4. 자료 간의 상관관계를 분석하여 현재 회의의 쟁점에 대한 구체적인 근거를 제시하세요.
5. 서론이나 끝인사 없이 바로 핵심 분석 내용부터 전문적인 어조로 작성하세요.`;

                const userPrompt = `[참고 자료]
${contextData || '(등록된 자료 없음)'}

[최근 회의 대화 기록]
${recentText}

위 자료와 대화 흐름을 종합 분석하여, 전문적이고 상세한 경영/금융 어드바이저리 리포트를 작성해 주세요.`;

                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key=${settings.apiKey}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: systemInstruction }] },
                        contents: [{ parts: [{ text: userPrompt }] }],
                        generationConfig: { temperature: 0.3, maxOutputTokens: 4096 }
                    })
                });

                if (!response.ok) throw new Error(`API ${response.status}`);

                // AI 블록 생성
                flashEmpty.style.display = 'none';
                const aiBlock = document.createElement('div');
                aiBlock.className = 'ai-answer';
                aiBlock.innerHTML = `<span class="ai-label">🤖 AI 분석${categoryTag}</span><span id="aiStreamText">▌</span>`;
                flashArea.appendChild(aiBlock);
                flashArea.scrollTop = flashArea.scrollHeight;

                const streamEl = aiBlock.querySelector('#aiStreamText');
                streamEl.removeAttribute('id');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                let lineBuffer = '';

                // SSE 라인 파싱 함수
                const parseSSE = (line) => {
                    if (line.startsWith('data: ')) {
                        const jsonStr = line.slice(6).trim();
                        if (jsonStr === '[DONE]' || !jsonStr) return;
                        try {
                            const data = JSON.parse(jsonStr);
                            const t = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
                            if (t) {
                                fullText += t;
                                streamEl.textContent = fullText + ' ▌';
                                flashArea.scrollTop = flashArea.scrollHeight;
                            }
                        } catch (e) {
                            console.warn('JSON parse error in stream:', e, jsonStr);
                        }
                    }
                };

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    lineBuffer += chunk;

                    const lines = lineBuffer.split('\n');
                    lineBuffer = lines.pop(); // 미완성 라인 대기

                    for (const line of lines) {
                        parseSSE(line);
                    }
                }

                // 루프 종료 후 남은 버퍼(마지막 라인) 처리
                if (lineBuffer) {
                    parseSSE(lineBuffer);
                }

                // 최종적으로 볼드체 처리된 HTML로 렌더링
                const finalHtml = fullText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                streamEl.innerHTML = finalHtml || '(응답 없음)';

            } catch (e) {
                showToast(`❌ AI 분석 실패: ${e.message}`);
                console.error('Gemini API error:', e);
            } finally {
                $('btnContext').disabled = false;
                $('btnContext').innerHTML = '🔍 맥락 분석';
            }
        }

        // ============================================================
        //  PIN FEATURE
        // ============================================================
        function pinCurrentText() {
            const recent = state.speechBuffer
                .filter(b => b.final)
                .slice(-3)
                .map(b => b.text)
                .join(' ');

            if (!recent) {
                showToast('⚠️ 핀할 텍스트가 없습니다');
                return;
            }

            const item = {
                text: recent,
                time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                id: Date.now(),
            };

            state.pinnedItems.push(item);
            renderPinnedList();
            showToast('📌 핀 저장됨');
        }

        function renderPinnedList() {
            const list = $('pinnedList');
            if (state.pinnedItems.length === 0) {
                list.innerHTML = '<div class="flash-empty" style="padding:40px 0;"><div class="flash-empty-text">핀한 메모가 없습니다</div></div>';
                return;
            }

            list.innerHTML = state.pinnedItems.map(item => `
            <div class="pinned-item">
                <div class="pinned-item-time">${item.time}</div>
                <div>${item.text}</div>
                <button class="pinned-item-delete" onclick="deletePin(${item.id})">✕</button>
            </div>
        `).join('');
        }

        function deletePin(id) {
            state.pinnedItems = state.pinnedItems.filter(p => p.id !== id);
            renderPinnedList();
        }

        // ============================================================
        //  THEME
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            $('btnTheme').textContent = isLight ? '🌑' : '🌙';
            localStorage.setItem('mc_theme', isLight ? 'light' : 'dark');
        }

        function loadTheme() {
            const theme = localStorage.getItem('mc_theme') || 'dark';
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                $('btnTheme').textContent = '🌑';
            }
        }

        // ============================================================
        //  EVENT HANDLERS
        // ============================================================
        function init() {
            loadTheme();
            initSettingsUI();
            state.recognition = initSTT();

            // 시트 자동 로드
            const settings = loadSettings();
            if (settings.sheetUrl) {
                loadSheetData(settings.sheetUrl);
            }

            // 듣기 시작/중지
            $('btnListen').addEventListener('click', () => {
                if (!state.recognition || state.isTransitioning) return;

                if (state.listening) {
                    state.listening = false;
                    state.isTransitioning = true;
                    $('btnListen').disabled = true;
                    state.recognition.stop();
                    releaseWakeLock();
                } else {
                    try {
                        state.isTransitioning = true;
                        $('btnListen').disabled = true;
                        state.recognition.start();
                        requestWakeLock();
                        startAudioHeartbeat();
                    } catch (e) {
                        state.isTransitioning = false;
                        $('btnListen').disabled = false;
                        showToast('❌ 마이크를 시작할 수 없습니다');
                    }
                }
            });

            // 맥락 분석
            $('btnContext').addEventListener('click', analyzeContext);

            // 핀
            $('btnPin').addEventListener('click', pinCurrentText);

            // 답변 지우기
            $('btnClearCards').addEventListener('click', () => {
                flashArea.querySelectorAll('.answer-line, .ai-answer').forEach(c => c.remove());
                flashEmpty.style.display = '';
                state.lastMatchedIndices.clear();
                showToast('🗑️ 답변 모두 삭제됨');
            });

            // 테마
            $('btnTheme').addEventListener('click', toggleTheme);

            // 전체화면
            $('btnFullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => { });
                    $('btnFullscreen').textContent = '⛶';
                } else {
                    document.exitFullscreen();
                    $('btnFullscreen').textContent = '⛶';
                }
            });

            // 핀 패널
            $('btnPins').addEventListener('click', () => $('pinnedPanel').classList.toggle('show'));
            $('btnPinsClose').addEventListener('click', () => $('pinnedPanel').classList.remove('show'));

            // 설정 모달
            $('btnSettings').addEventListener('click', () => {
                initSettingsUI();
                $('settingsModal').classList.add('show');
            });

            $('settingsClose')?.addEventListener('click', () => $('settingsModal').classList.remove('show'));
            $('btnSettingsClose').addEventListener('click', () => $('settingsModal').classList.remove('show'));

            $('btnSettingsSave').addEventListener('click', () => {
                saveSettings({
                    apiKey: $('inputApiKey').value.trim(),
                    sheetUrl: $('inputSheetUrl').value.trim(),
                    sensitivity: parseInt($('inputSensitivity').value) || 1,
                });
                showToast('✅ 설정 저장됨');
                $('settingsModal').classList.remove('show');

                // 시트 URL이 변경되었으면 재로드
                const s = loadSettings();
                if (s.sheetUrl) loadSheetData(s.sheetUrl);
            });

            $('btnUpdateApp').addEventListener('click', forceUpdateApp);

            // 모달 외부 클릭으로 닫기
            $('settingsModal').addEventListener('click', (e) => {
                if (e.target === $('settingsModal')) $('settingsModal').classList.remove('show');
            });

            // 키보드 단축키
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    $('btnListen').click();
                }
                if (e.key === 'c' || e.key === 'C') {
                    $('btnContext').click();
                }
                if (e.key === 'p' || e.key === 'P') {
                    $('btnPin').click();
                }
            });
        }

        // 백그라운드 복귀 시 자동 재개
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && state.listening) {
                console.log('App returned to foreground. Ensuring STT is active...');
                try { state.recognition.start(); } catch (e) { }
                startAudioHeartbeat();
            }
        });

        // ============================================================
        //  PWA SERVICE WORKER
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => {
                console.log('SW registration skipped:', err);
            });
        }

        // ============================================================
        //  BOOT
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
